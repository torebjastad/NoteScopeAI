<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="Real-time piano note detection powered by a neural network, running entirely in your browser.">
    <title>NoteScope AI</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- ONNX Runtime Web from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
</head>
<body>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loading-text">Loading neural network...</div>
    </div>

    <header>
        <h1>NoteScope<span class="ai">AI</span></h1>
        <p class="tagline">Real-time piano note detection</p>
    </header>

    <main>
        <!-- Detected note -->
        <section class="note-display" id="note-display">
            <div class="detected-note" id="detected-note">&mdash;</div>
        </section>

        <!-- Confidence -->
        <section class="confidence-section">
            <div class="confidence-bar">
                <div class="bar-fill" id="bar-fill"></div>
            </div>
            <span class="confidence-text" id="confidence-text">&nbsp;</span>
        </section>

        <!-- Runner-ups -->
        <div class="runner-ups" id="runner-ups">
            <div class="runner-up">
                <span class="name" id="ru1-name">&nbsp;</span>
                <span class="prob" id="ru1-prob"></span>
            </div>
            <div class="runner-up">
                <span class="name" id="ru2-name">&nbsp;</span>
                <span class="prob" id="ru2-prob"></span>
            </div>
        </div>

        <!-- Mel spectrogram -->
        <section class="spectrogram-container">
            <div class="spectrogram-label">Mel spectrogram</div>
            <canvas id="mel-canvas" width="650" height="256"></canvas>
        </section>

        <!-- Controls -->
        <section class="controls">
            <button class="primary-btn" id="start-btn" disabled>Start Listening</button>
            <div class="status-text" id="status-text">Loading model...</div>
            <div class="latency" id="latency-text"></div>
        </section>
    </main>

    <footer>
        PianoNet CNN<span class="sep">&middot;</span>98% accuracy<span class="sep">&middot;</span>88 keys<span class="sep">&middot;</span>runs in your browser
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
